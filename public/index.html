<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake AGI</title>

<style>
body {
  margin: 0;
  padding: 16px;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.chat-container {
  width: min(100%, 460px);
  height: min(720px, calc(100vh - 32px));
  background: #1e293b;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
}

.header {
  padding: 15px;
  background: #020617;
  font-weight: bold;
  text-align: center;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.msg {
  max-width: 80%;
  padding: 10px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.4;
}

.user {
  align-self: flex-end;
  background: #3b82f6;
}

.bot {
  align-self: flex-start;
  background: #334155;
}

.update {
  align-self: flex-start;
  background: #14532d;
}

.meta {
  font-size: 12px;
  opacity: 0.7;
}

.input-area {
  display: flex;
  padding: 10px;
  background: #020617;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">Fake AGI Multi-Agent Chat</div>
  <div id="messages" class="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask something or define a memory like apple = banana" />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const MAX_MESSAGES = 120;
let lastUpdateTimestamp = 0;

const messages = document.getElementById("messages");
const input = document.getElementById("input");

function appendMessage(html, className) {
  const div = document.createElement("div");
  div.className = "msg " + className;
  div.innerHTML = html;
  messages.appendChild(div);

  while (messages.children.length > MAX_MESSAGES) {
    messages.removeChild(messages.firstChild);
  }

  messages.scrollTop = messages.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  appendMessage(text, "user");
  input.value = "";

  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "thinking...";
  messages.appendChild(typing);

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await response.json();
    typing.remove();

    if (!response.ok) {
      throw new Error(data.error || "request failed");
    }

    appendMessage(
      `${data.reply}<div class="meta">confidence: ${data.confidence} | queued: ${data.queuedTaskId ? "yes" : "no"}</div>`,
      "bot"
    );
  } catch (error) {
    typing.remove();
    appendMessage(error.message || "request failed", "bot");
  }
}

async function pollUpdates() {
  try {
    const response = await fetch(`/updates?since=${lastUpdateTimestamp}`);
    const data = await response.json();

    for (const update of data.updates || []) {
      lastUpdateTimestamp = Math.max(lastUpdateTimestamp, update.createdAt || 0);
      appendMessage(
        `Improved answer for: "${update.originalQuestion}"<br><br>${update.answer}<div class="meta">offline confidence: ${update.confidence}</div>`,
        "update"
      );
    }
  } catch (error) {
    console.error(error);
  }
}

input.addEventListener("keypress", function (event) {
  if (event.key === "Enter") {
    send();
  }
});

setInterval(pollUpdates, 5000);
pollUpdates();
</script>

</body>
</html>
