<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake AGI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
}

.layout {
  display: grid;
  grid-template-columns: minmax(320px, 560px) minmax(280px, 380px);
  gap: 16px;
  min-height: 100vh;
  padding: 16px;
  box-sizing: border-box;
}

.panel {
  background: #111827;
  border-radius: 18px;
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.panel-header {
  padding: 16px;
  background: #020617;
  font-weight: bold;
}

.messages,
.thoughts {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg,
.thought {
  border-radius: 14px;
  padding: 12px;
  line-height: 1.45;
}

.msg.user {
  align-self: flex-end;
  max-width: 80%;
  background: #2563eb;
}

.msg.bot {
  align-self: flex-start;
  max-width: 85%;
  background: #334155;
}

.msg.update {
  align-self: flex-start;
  max-width: 85%;
  background: #14532d;
}

.thought {
  background: #1f2937;
}

.thought-agent {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.7;
  margin-bottom: 6px;
}

.thought-meta {
  font-size: 12px;
  opacity: 0.65;
  margin-top: 8px;
}

.input-area {
  display: flex;
  gap: 10px;
  padding: 12px;
  background: #020617;
}

input {
  flex: 1;
  border: none;
  border-radius: 10px;
  padding: 12px;
  outline: none;
}

button {
  border: none;
  border-radius: 10px;
  padding: 12px 16px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.empty {
  opacity: 0.7;
  font-size: 14px;
}

@media (max-width: 900px) {
  .layout {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="layout">
  <div class="panel">
    <div class="panel-header">Fake AGI Chat</div>
    <div id="messages" class="messages"></div>

    <div class="input-area">
      <input id="input" placeholder="Say hi, ask a question, or define memory like apple = banana" />
      <button onclick="send()">Send</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">Thought Stream</div>
    <div id="thoughts" class="thoughts">
      <div class="empty">Background and agent activity will appear here.</div>
    </div>
  </div>
</div>

<script>
const MAX_MESSAGES = 120;
const MAX_THOUGHTS = 120;

let lastUpdateTimestamp = 0;
let lastThoughtTimestamp = 0;

const messages = document.getElementById("messages");
const thoughts = document.getElementById("thoughts");
const input = document.getElementById("input");

function trimChildren(container, limit) {
  while (container.children.length > limit) {
    container.removeChild(container.firstChild);
  }
}

function appendMessage(text, className) {
  const div = document.createElement("div");
  div.className = "msg " + className;
  div.innerText = text;
  messages.appendChild(div);
  trimChildren(messages, MAX_MESSAGES);
  messages.scrollTop = messages.scrollHeight;
}

function appendThought(thought) {
  const empty = thoughts.querySelector(".empty");
  if (empty) {
    empty.remove();
  }

  const div = document.createElement("div");
  div.className = "thought";

  const metaBits = [];
  if (thought.mode) metaBits.push(thought.mode);
  if (thought.score !== null && thought.score !== undefined) metaBits.push(`score ${thought.score}`);
  if (thought.confidence !== null && thought.confidence !== undefined) metaBits.push(`confidence ${thought.confidence}`);

  div.innerHTML = `
    <div class="thought-agent">${thought.agent}</div>
    <div>${thought.text}</div>
    <div class="thought-meta">${metaBits.join(" | ")}</div>
  `;

  thoughts.appendChild(div);
  trimChildren(thoughts, MAX_THOUGHTS);
  thoughts.scrollTop = thoughts.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  appendMessage(text, "user");
  input.value = "";

  const waiting = document.createElement("div");
  waiting.className = "msg bot";
  waiting.innerText = "Let me think for a moment.";
  messages.appendChild(waiting);

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await response.json();
    waiting.remove();

    if (!response.ok) {
      throw new Error(data.error || "Request failed");
    }

    appendMessage(data.reply, "bot");

    if (data.followUpMessage) {
      appendMessage(data.followUpMessage, "bot");
    }
  } catch (error) {
    waiting.remove();
    appendMessage(error.message || "Request failed", "bot");
  }
}

async function pollUpdates() {
  try {
    const response = await fetch(`/updates?since=${lastUpdateTimestamp}`);
    const data = await response.json();

    for (const update of data.updates || []) {
      lastUpdateTimestamp = Math.max(lastUpdateTimestamp, update.createdAt || 0);
      appendMessage(
        `I kept working on your earlier question and found a better answer:\n\n${update.answer}`,
        "update"
      );
    }
  } catch (error) {
    console.error(error);
  }
}

async function pollThoughts() {
  try {
    const response = await fetch(`/thoughts?since=${lastThoughtTimestamp}`);
    const data = await response.json();

    for (const thought of data.thoughts || []) {
      lastThoughtTimestamp = Math.max(lastThoughtTimestamp, thought.createdAt || 0);
      appendThought(thought);
    }
  } catch (error) {
    console.error(error);
  }
}

input.addEventListener("keypress", function (event) {
  if (event.key === "Enter") {
    send();
  }
});

setInterval(pollUpdates, 5000);
setInterval(pollThoughts, 2500);
pollUpdates();
pollThoughts();
</script>

</body>
</html>
